# Deploy when a new GitHub Release is published.
# Requires repository secrets: DEPLOY_WEBHOOK_URL, DEPLOY_TOKEN

name: Deploy on release

on:
  release:
    types: [published]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const res = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.release.tag_name,
              environment: 'production',
              auto_merge: false,
              description: `Deploy release ${context.payload.release.tag_name}`,
            });
            if (res.status === 201) {
              core.setOutput('deployment_id', res.data.id);
            } else {
              core.setFailed('Failed to create deployment');
            }

      - name: Set deployment in progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Triggering deploy...',
            });

      - name: Trigger deploy
        id: trigger
        env:
          TAG: ${{ github.event.release.tag_name }}
          DEPLOY_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_URL" ] || [ -z "$TOKEN" ]; then
            echo "Missing DEPLOY_WEBHOOK_URL or DEPLOY_TOKEN"
            exit 1
          fi
          # API allows uuid OR tag, not both. Use base URL + tag only.
          base="${DEPLOY_URL%%\?*}"
          url="${base}?tag=${TAG}&force=false"
          echo "Triggering deploy for tag: $TAG"
          resp=$(curl -s -w "\n%{http_code}" -X GET "$url" -H "Authorization: Bearer $TOKEN")
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "Response ($code): $body"
          if [ "$code" -lt 200 ] || [ "$code" -gt 299 ]; then
            echo "deploy_failed=true" >> $GITHUB_OUTPUT
            echo "Deploy request failed with HTTP $code"
            exit 1
          fi
          echo "deploy_failed=false" >> $GITHUB_OUTPUT
          echo "Deploy triggered."

      - name: Set deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create.outputs.deployment_id }},
              state: 'success',
              description: 'Deploy triggered successfully',
            });

      - name: Set deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create.outputs.deployment_id }},
              state: 'failure',
              description: 'Deploy request failed',
            });
