# Deploy to Coolify when a new Git tag is pushed (e.g. v1.0.0).
# Requires GitHub secrets: COOLIFY_DEPLOY_URL, COOLIFY_TOKEN

name: Deploy on tag

on:
  push:
    tags:
      - 'v*'   # e.g. v1.0.0, v2.0.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Coolify by tag
        env:
          TAG: ${{ github.ref_name }}
          # Append tag to deploy URL so Coolify builds/deploys this tag instead of default branch
          DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_URL" ] || [ -z "$TOKEN" ]; then
            echo "Missing COOLIFY_DEPLOY_URL or COOLIFY_TOKEN"
            exit 1
          fi
          url="$DEPLOY_URL"
          if [[ "$url" == *"?"* ]]; then
            url="${url}&tag=${TAG}"
          else
            url="${url}?tag=${TAG}"
          fi
          echo "Triggering Coolify deploy for tag: $TAG"
          curl -sf -X GET "$url" -H "Authorization: Bearer $TOKEN"
          echo ""
          echo "Deploy triggered."
