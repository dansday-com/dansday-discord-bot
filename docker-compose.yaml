services:
  app:
    build: .
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE:-Asia/Jakarta}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      CONTROL_PANEL_PORT: ${CONTROL_PANEL_PORT:-80}
      SESSION_SECRET: ${SESSION_SECRET}
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "3333:${CONTROL_PANEL_PORT:-80}"
    volumes:
      - app_data:/app/data
    networks:
      - app

volumes:
  app_data:
    driver: local

networks:
  app:
    driver: bridge
