services:
  database:
    image: mariadb:10.11
    container_name: goblox-database
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - goblox-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: goblox-app
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@database:3306/${DB_NAME}
      CONTROL_PANEL_PORT: ${CONTROL_PANEL_PORT:-8080}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "${CONTROL_PANEL_PORT:-8080}:${CONTROL_PANEL_PORT:-8080}"
    volumes:
      - app_data:/app/data
    networks:
      - goblox-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: goblox-phpmyadmin
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "8081:80"
    networks:
      - goblox-network

volumes:
  mysql_data:
    driver: local
  app_data:
    driver: local

networks:
  goblox-network:
    driver: bridge

