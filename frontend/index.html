<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO BLOX Bot Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        /* Bot List View */
        .bot-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .bot-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .bot-card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .bot-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .bot-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .bot-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .bot-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .bot-type.official {
            background: #28a745;
            color: white;
        }

        .bot-type.selfbot {
            background: #ffc107;
            color: #333;
        }

        /* Form Styles */
        .form-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Server List */
        .server-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .server-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid transparent;
        }

        .server-card:hover {
            border-color: #667eea;
        }

        .server-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .back-btn {
            margin-bottom: 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 GO BLOX Bot Control</h1>
        <p class="subtitle">Manage your Discord bots remotely</p>

        <div class="message" id="message"></div>

        <!-- Bot List View -->
        <div id="botListView">
            <div class="header-actions">
                <h2>Your Bots</h2>
                <button class="btn btn-primary" onclick="showAddBotForm()">➕ Add Bot</button>
            </div>
            <div class="bot-list" id="botList"></div>
        </div>

        <!-- Add Bot Form -->
        <div id="addBotForm" style="display: none;">
            <div class="back-btn">
                <button class="btn btn-secondary" onclick="showBotList()">← Back</button>
            </div>
            <h2 style="margin-bottom: 20px;">Add New Bot</h2>
            <div class="form-section">
                <div class="form-group">
                    <label for="botType">Bot Type <span style="color: red;">*</span>:</label>
                    <select id="botType" onchange="toggleConnectTo()" required>
                        <option value="">Select type...</option>
                        <option value="official">Official Bot</option>
                        <option value="selfbot">Self-Bot</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="botToken">Bot Token <span style="color: red;">*</span>:</label>
                    <input type="password" id="botToken" placeholder="Bot token (required)" required>
                </div>

                <div class="form-group" id="applicationIdGroup">
                    <label for="botApplicationId">Application ID <span style="color: red;">*</span>:</label>
                    <input type="text" id="botApplicationId" placeholder="Application ID (required)" required>
                </div>

                <div class="form-group" id="connectToGroup" style="display: none;">
                    <label for="connectTo">Connect To (Official Bot) <span style="color: red;">*</span>:</label>
                    <select id="connectTo">
                        <option value="">Select official bot...</option>
                    </select>
                </div>

                <div class="form-group" id="portGroup">
                    <label for="botPort">Port:</label>
                    <input type="number" id="botPort" placeholder="7777" value="7777">
                </div>

                <p style="color: #666; font-size: 12px; margin-top: -10px; margin-bottom: 10px;">
                    💡 Bot name and icon will be automatically synced from Discord when the bot is running
                </p>

                <button class="btn btn-success" onclick="submitAddBot()" style="width: 100%;">✅ Add Bot</button>
            </div>
        </div>

        <!-- Bot Detail View -->
        <div id="botDetailView" style="display: none;">
            <div class="back-btn">
                <button class="btn btn-secondary" onclick="showBotList()">← Back to Bots</button>
            </div>
            <div id="botDetailContent"></div>
        </div>
    </div>

    <script>
        let currentBotId = null;

        // Load bots on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadBots();
        });

        async function loadBots() {
            try {
                const res = await fetch('/api/bots');
                const bots = await res.json();

                const botListEl = document.getElementById('botList');
                
                if (bots.length === 0) {
                    botListEl.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                            <p style="color: #666; margin-bottom: 20px;">No bots configured yet</p>
                            <button class="btn btn-primary" onclick="showAddBotForm()">➕ Add Your First Bot</button>
                        </div>
                    `;
                } else {
                    botListEl.innerHTML = bots.map(bot => `
                        <div class="bot-card" onclick="viewBot('${bot.id}')">
                            <div class="bot-card-header">
                                <div class="bot-icon">
                                    ${bot.bot_icon ? `<img src="${bot.bot_icon}" style="width: 100%; height: 100%; border-radius: 50%;">` : '🤖'}
                                </div>
                                <div class="bot-info">
                                    <h3>${bot.name}</h3>
                                    <span class="bot-type ${bot.bot_type}">${bot.bot_type}</span>
                                </div>
                            </div>
                            <div style="color: #666; font-size: 12px;">
                                <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: ${bot.status === 'running' ? '#10b981' : bot.status === 'starting' ? '#f59e0b' : bot.status === 'stopping' ? '#ef4444' : '#6b7280'}; margin-right: 4px;"></span>
                                ${bot.status || 'stopped'}
                                ${bot.bot_type === 'official' ? ` • Port: ${bot.port}` : ''}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                showMessage('Failed to load bots', 'error');
                console.error(err);
            }
        }

        function formatUptime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) {
                return `${days}d ${hours % 24}h`;
            } else if (hours > 0) {
                return `${hours}h ${minutes % 60}m`;
            } else if (minutes > 0) {
                return `${minutes}m ${seconds % 60}s`;
            } else {
                return `${seconds}s`;
            }
        }

        function showAddBotForm() {
            document.getElementById('botListView').style.display = 'none';
            document.getElementById('addBotForm').style.display = 'block';
            document.getElementById('botDetailView').style.display = 'none';
            
            // Load official bots for connect_to dropdown
            loadOfficialBots();
        }

        function showBotList() {
            document.getElementById('botListView').style.display = 'block';
            document.getElementById('addBotForm').style.display = 'none';
            document.getElementById('botDetailView').style.display = 'none';
            currentBotId = null;
            loadBots();
        }

        async function loadOfficialBots() {
            try {
                const res = await fetch('/api/bots');
                const bots = await res.json();
                const officialBots = bots.filter(b => b.bot_type === 'official');
                
                const select = document.getElementById('connectTo');
                select.innerHTML = '<option value="">Select official bot...</option>' +
                    officialBots.map(bot => `<option value="${bot.id}">${bot.name}</option>`).join('');
            } catch (err) {
                console.error('Failed to load official bots:', err);
            }
        }

        function toggleConnectTo() {
            const botType = document.getElementById('botType').value;
            const connectToGroup = document.getElementById('connectToGroup');
            const applicationIdGroup = document.getElementById('applicationIdGroup');
            const portGroup = document.getElementById('portGroup');
            
            if (botType === 'selfbot') {
                connectToGroup.style.display = 'block';
                document.getElementById('connectTo').required = true;
                applicationIdGroup.style.display = 'none';
                document.getElementById('botApplicationId').required = false;
                portGroup.style.display = 'none';
            } else {
                connectToGroup.style.display = 'none';
                document.getElementById('connectTo').required = false;
                applicationIdGroup.style.display = 'block';
                document.getElementById('botApplicationId').required = true;
                portGroup.style.display = 'block';
            }
        }

        async function submitAddBot() {
            const token = document.getElementById('botToken').value;
            const botType = document.getElementById('botType').value;
            const applicationId = botType === 'official' ? document.getElementById('botApplicationId').value : null;
            const port = botType === 'official' ? (parseInt(document.getElementById('botPort').value) || 7777) : 7777;
            const connectTo = botType === 'selfbot' ? document.getElementById('connectTo').value : null;

            if (!token || !botType) {
                showMessage('Token and Bot Type are required', 'error');
                return;
            }

            if (botType === 'official' && !applicationId) {
                showMessage('Application ID is required for official bots', 'error');
                return;
            }

            if (botType === 'selfbot' && !connectTo) {
                showMessage('Selfbot must connect to an official bot', 'error');
                return;
            }

            try {
                const res = await fetch('/api/bots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: null, // Will be set when bot connects
                        token,
                        application_id: applicationId,
                        bot_type: botType,
                        bot_icon: null, // Will be set when bot connects
                        port,
                        connect_to: connectTo
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('Bot added successfully!', 'success');
                    setTimeout(() => {
                        showBotList();
                    }, 1500);
                } else {
                    showMessage(`Failed to add bot: ${data.error}`, 'error');
                }
            } catch (err) {
                showMessage('Failed to add bot', 'error');
                console.error(err);
            }
        }

        async function viewBot(botId) {
            currentBotId = botId;
            
            try {
                const [botRes, serversRes] = await Promise.all([
                    fetch(`/api/bots/${botId}`),
                    fetch(`/api/bots/${botId}/servers`)
                ]);

                const bot = await botRes.json();
                const servers = await serversRes.json();

                document.getElementById('botListView').style.display = 'none';
                document.getElementById('addBotForm').style.display = 'none';
                document.getElementById('botDetailView').style.display = 'block';

                const detailContent = document.getElementById('botDetailContent');
                detailContent.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                        <div class="bot-icon" style="width: 80px; height: 80px; font-size: 40px;">
                            ${bot.bot_icon ? `<img src="${bot.bot_icon}" style="width: 100%; height: 100%; border-radius: 50%;">` : '🤖'}
                        </div>
                        <div style="flex: 1;">
                            <h2>${bot.name}</h2>
                            <span class="bot-type ${bot.bot_type}">${bot.bot_type}</span>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-success" onclick="startBot('${bot.id}')" id="startBtn_${bot.id}" ${bot.status === 'running' || bot.status === 'starting' ? 'disabled' : ''}>▶️ Start</button>
                            <button class="btn btn-danger" onclick="stopBot('${bot.id}')" id="stopBtn_${bot.id}" ${bot.status !== 'running' && bot.status !== 'starting' ? 'disabled' : ''}>⏹️ Stop</button>
                            <button class="btn btn-secondary" onclick="restartBot('${bot.id}')" id="restartBtn_${bot.id}" ${bot.status !== 'running' && bot.status !== 'starting' ? 'disabled' : ''}>🔄 Restart</button>
                            <button class="btn btn-danger" onclick="deleteBot('${bot.id}')">🗑️ Delete</button>
                        </div>
                    </div>

                    <div style="background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                            <div>
                                <div style="color: #666; font-size: 12px;">Status</div>
                                <div style="font-weight: 600;">
                                    <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: ${bot.status === 'running' ? '#10b981' : bot.status === 'starting' ? '#f59e0b' : bot.status === 'stopping' ? '#ef4444' : '#6b7280'}; margin-right: 6px;"></span>
                                    ${bot.status || 'stopped'}
                                </div>
                            </div>
                            ${bot.process_id ? `
                            <div>
                                <div style="color: #666; font-size: 12px;">Process ID</div>
                                <div style="font-weight: 600;">${bot.process_id}</div>
                            </div>
                            ` : ''}
                            ${bot.uptime_ms && bot.uptime_ms > 0 ? `
                            <div>
                                <div style="color: #666; font-size: 12px;">Uptime</div>
                                <div style="font-weight: 600;">${formatUptime(bot.uptime_ms)}</div>
                            </div>
                            ` : ''}
                            ${bot.bot_type === 'official' ? `
                            <div>
                                <div style="color: #666; font-size: 12px;">Port</div>
                                <div style="font-weight: 600;">${bot.port}</div>
                            </div>
                            ${bot.application_id ? `
                            <div>
                                <div style="color: #666; font-size: 12px;">Invite URL</div>
                                <div style="font-weight: 600; font-size: 11px;">
                                    <a href="https://discord.com/api/oauth2/authorize?client_id=${bot.application_id}&permissions=8&scope=bot" target="_blank" style="color: #667eea; text-decoration: none; word-break: break-all;">
                                        Invite Bot
                                    </a>
                                </div>
                            </div>
                            ` : ''}
                            ` : ''}
                            ${bot.connect_to && bot.connected_bot_name ? `
                            <div>
                                <div style="color: #666; font-size: 12px;">Connected To</div>
                                <div style="font-weight: 600;">${bot.connected_bot_name}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <h3 style="margin-bottom: 20px;">Servers (${servers.length})</h3>
                    <div class="server-list">
                        ${servers.length === 0 ? '<p style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">No servers yet. Bot will sync servers automatically when running.</p>' :
                        servers.map(server => `
                            <div class="server-card">
                                ${server.server_icon ? `<img src="${server.server_icon}" class="server-icon">` : '<div class="server-icon" style="background: #667eea;"></div>'}
                                <h4>${server.name}</h4>
                                <div style="font-size: 12px; color: #666; margin-top: 8px;">
                                    <div>👥 ${server.total_members} members</div>
                                    <div>📊 Level ${server.boost_level}</div>
                                    <div>🚀 ${server.total_boosters} boosters</div>
                                    <div>📝 ${server.total_channels} channels</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (err) {
                showMessage('Failed to load bot details', 'error');
                console.error(err);
            }
        }

        async function startBot(botId) {
            const startBtn = document.getElementById(`startBtn_${botId}`);
            const stopBtn = document.getElementById(`stopBtn_${botId}`);
            const restartBtn = document.getElementById(`restartBtn_${botId}`);
            
            // Disable start button, enable stop/restart
            if (startBtn) startBtn.disabled = true;
            if (stopBtn) stopBtn.disabled = false;
            if (restartBtn) restartBtn.disabled = false;
            
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bot_id: botId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Bot started successfully!', 'success');
                } else {
                    showMessage(`Failed to start: ${data.error}`, 'error');
                    // Re-enable start button on error
                    if (startBtn) startBtn.disabled = false;
                    if (stopBtn) stopBtn.disabled = true;
                    if (restartBtn) restartBtn.disabled = true;
                }
            } catch (err) {
                showMessage('Failed to start bot', 'error');
                console.error(err);
                // Re-enable start button on error
                if (startBtn) startBtn.disabled = false;
                if (stopBtn) stopBtn.disabled = true;
                if (restartBtn) restartBtn.disabled = true;
            }
        }

        async function stopBot(botId) {
            const startBtn = document.getElementById(`startBtn_${botId}`);
            const stopBtn = document.getElementById(`stopBtn_${botId}`);
            const restartBtn = document.getElementById(`restartBtn_${botId}`);
            
            // Disable stop/restart buttons, enable start
            if (startBtn) startBtn.disabled = false;
            if (stopBtn) stopBtn.disabled = true;
            if (restartBtn) restartBtn.disabled = true;
            
            try {
                const res = await fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bot_id: botId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Bot stopped successfully!', 'success');
                } else {
                    showMessage(`Failed to stop: ${data.error}`, 'error');
                    // Re-enable stop/restart on error
                    if (stopBtn) stopBtn.disabled = false;
                    if (restartBtn) restartBtn.disabled = false;
                    if (startBtn) startBtn.disabled = true;
                }
            } catch (err) {
                showMessage('Failed to stop bot', 'error');
                console.error(err);
                // Re-enable stop/restart on error
                if (stopBtn) stopBtn.disabled = false;
                if (restartBtn) restartBtn.disabled = false;
                if (startBtn) startBtn.disabled = true;
            }
        }

        async function restartBot(botId) {
            const startBtn = document.getElementById(`startBtn_${botId}`);
            const stopBtn = document.getElementById(`stopBtn_${botId}`);
            const restartBtn = document.getElementById(`restartBtn_${botId}`);
            
            // Disable all buttons during restart
            if (startBtn) startBtn.disabled = true;
            if (stopBtn) stopBtn.disabled = true;
            if (restartBtn) restartBtn.disabled = true;
            
            try {
                const res = await fetch('/api/restart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bot_id: botId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Bot restarting...', 'success');
                    // After restart, stop/restart should be enabled
                    setTimeout(() => {
                        if (stopBtn) stopBtn.disabled = false;
                        if (restartBtn) restartBtn.disabled = false;
                    }, 3000);
                } else {
                    showMessage(`Failed to restart: ${data.error}`, 'error');
                    // Re-enable buttons on error
                    if (startBtn) startBtn.disabled = false;
                    if (stopBtn) stopBtn.disabled = true;
                    if (restartBtn) restartBtn.disabled = true;
                }
            } catch (err) {
                showMessage('Failed to restart bot', 'error');
                console.error(err);
                // Re-enable buttons on error
                if (startBtn) startBtn.disabled = false;
                if (stopBtn) stopBtn.disabled = true;
                if (restartBtn) restartBtn.disabled = true;
            }
        }

        // Auto-refresh bot list and detail view every 5 seconds to show updated status/uptime
        setInterval(() => {
            if (currentBotId) {
                // Refresh bot detail view
                viewBot(currentBotId).catch(() => {});
            } else {
                // Refresh bot list
                loadBots().catch(() => {});
            }
        }, 5000);

        async function deleteBot(botId) {
            if (!confirm('Are you sure you want to delete this bot? This will also delete all associated servers, channels, and roles.')) {
                return;
            }

            try {
                const res = await fetch(`/api/bots/${botId}`, {
                    method: 'DELETE'
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('Bot deleted successfully', 'success');
                    setTimeout(() => {
                        showBotList();
                    }, 1500);
                } else {
                    showMessage(`Failed to delete bot: ${data.error}`, 'error');
                }
            } catch (err) {
                showMessage('Failed to delete bot', 'error');
                console.error(err);
            }
        }

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
