<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO BLOX Bot Control Panel</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.light {
            background: #f5f5f5;
            color: #000000;
        }

        .container {
            background: #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.1);
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
            border: 1px solid #333333;
            transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        body.light .container {
            background: #ffffff;
            border-color: #e0e0e0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 600;
        }

        h3 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: 600;
        }

        h4 {
            color: #ffffff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #cccccc;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .message {
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.4);
        }

        .message.error {
            background: rgba(220, 53, 69, 0.2);
            color: #ff4444;
            border: 1px solid rgba(220, 53, 69, 0.4);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: #dc3545;
            color: white;
        }

        .btn-primary:hover {
            background: #c82333;
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
        }

        .btn-secondary {
            background: #333333;
            color: white;
        }

        .btn-secondary:hover {
            background: #404040;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        .btn-warning {
            background: #ffc107;
            color: #000000;
        }

        .btn-warning:hover {
            background: #e0a800;
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.4);
        }

        /* Bot List View */
        .bot-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .bot-card {
            background: #0d0d0d;
            border-radius: 14px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #333333;
            position: relative;
            overflow: hidden;
        }

        .bot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(220, 53, 69, 0.1), transparent);
            transition: left 0.5s;
        }

        .bot-card:hover::before {
            left: 100%;
        }

        .bot-card:hover {
            border-color: #dc3545;
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(220, 53, 69, 0.2);
        }

        .bot-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .bot-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #dc3545;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #333333;
            transition: all 0.3s ease;
        }

        .bot-card:hover .bot-icon {
            border-color: #dc3545;
            transform: scale(1.05);
        }

        .bot-info h3 {
            color: #ffffff;
            margin-bottom: 5px;
        }

        .bot-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bot-type.official {
            background: #dc3545;
            color: white;
        }

        .bot-type.selfbot {
            background: #333333;
            color: #ffffff;
            border: 1px solid #dc3545;
        }

        /* Form Styles */
        .form-section {
            background: #0d0d0d;
            border-radius: 14px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #333333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #333333;
            border-radius: 10px;
            font-size: 14px;
            background: #1a1a1a;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        /* Server List */
        .server-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .server-card {
            background: #0d0d0d;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }

        .server-card:hover {
            border-color: #dc3545;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.15);
        }

        .server-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid #333333;
        }

        .back-btn {
            margin-bottom: 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #dc3545;
            border: 2px solid #333333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        body.light .theme-toggle {
            background: #ffc107;
            border-color: #e0e0e0;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(180deg);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.5);
        }

        body.light .theme-toggle:hover {
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.5);
        }

        /* Light mode styles */
        body.light h1, body.light h2, body.light h3, body.light h4 {
            color: #000000;
        }

        body.light .subtitle {
            color: #666666;
        }

        body.light .bot-card {
            background: #ffffff;
            border-color: #e0e0e0;
        }

        body.light .bot-card:hover {
            border-color: #dc3545;
            box-shadow: 0 12px 32px rgba(220, 53, 69, 0.15);
        }

        body.light .form-section {
            background: #ffffff;
            border-color: #e0e0e0;
        }

        body.light .form-group label {
            color: #000000;
        }

        body.light .form-group input,
        body.light .form-group select {
            background: #f5f5f5;
            border-color: #e0e0e0;
            color: #000000;
        }

        body.light .form-group input:focus,
        body.light .form-group select:focus {
            border-color: #dc3545;
        }

        body.light .server-card {
            background: #ffffff;
            border-color: #e0e0e0;
        }

        body.light .server-card:hover {
            border-color: #dc3545;
        }

        body.light .message.success,
        body.light .message.error {
            background: rgba(220, 53, 69, 0.1);
            border-color: rgba(220, 53, 69, 0.3);
        }

        body.light .message.success {
            color: #28a745;
        }

        body.light .message.error {
            color: #dc3545;
        }

        /* Smooth transitions for all elements */
        h1, h2, h3, h4, .subtitle, .bot-card, .form-section, .server-card,
        .form-group input, .form-group select, .bot-card-header, .bot-info h3 {
            transition: color 0.5s ease, background-color 0.5s ease, border-color 0.5s ease;
        }

        /* Light mode styles for dynamically generated content */
        body.light .bot-info-card {
            background: #ffffff !important;
            border-color: #e0e0e0 !important;
        }

        body.light .info-label {
            color: #666666 !important;
        }

        body.light .info-value {
            color: #000000 !important;
        }

        body.light .server-info {
            color: #666666 !important;
        }

        body.light .server-card h4 {
            color: #000000 !important;
        }

        body.light .bot-status-text {
            color: #666666 !important;
        }

        body.light .empty-message {
            color: #666666 !important;
        }

        body.light .form-hint {
            color: #666666 !important;
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
        🌙
    </button>

    <div class="container">
        <h1>🤖 GO BLOX Bot Control</h1>
        <p class="subtitle">Manage your Discord bots remotely</p>

        <div class="message" id="message"></div>

        <!-- Bot List View -->
        <div id="botListView">
            <div class="header-actions">
                <h2>Your Bots</h2>
                <button class="btn btn-success" onclick="showAddBotForm()">➕ Add Bot</button>
            </div>
            <div class="bot-list" id="botList"></div>
        </div>

        <!-- Add Bot Form -->
        <div id="addBotForm" style="display: none;">
            <div class="back-btn">
                <button class="btn btn-secondary" onclick="showBotList()">← Back</button>
            </div>
            <h2 style="margin-bottom: 20px;">Add New Bot</h2>
            <div class="form-section">
                <div class="form-group">
                    <label for="botType">Bot Type <span style="color: red;">*</span>:</label>
                    <select id="botType" onchange="toggleConnectTo()" required>
                        <option value="">Select type...</option>
                        <option value="official">Official Bot</option>
                        <option value="selfbot">Self-Bot</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="botToken">Bot Token <span style="color: red;">*</span>:</label>
                    <input type="password" id="botToken" placeholder="Bot token (required)" required>
                </div>

                <div class="form-group" id="applicationIdGroup">
                    <label for="botApplicationId">Application ID <span style="color: red;">*</span>:</label>
                    <input type="text" id="botApplicationId" placeholder="Application ID (required)" required>
                </div>

                <div class="form-group" id="connectToGroup" style="display: none;">
                    <label for="connectTo">Connect To (Official Bot) <span style="color: red;">*</span>:</label>
                    <select id="connectTo">
                        <option value="">Select official bot...</option>
                    </select>
                </div>

                <div class="form-group" id="portGroup">
                    <label for="botPort">Port:</label>
                    <input type="number" id="botPort" placeholder="7777" value="7777">
                </div>

                <p class="form-hint" style="color: #cccccc; font-size: 12px; margin-top: -10px; margin-bottom: 10px; transition: color 0.5s ease;">
                    💡 Bot name and icon will be automatically synced from Discord when the bot is running
                </p>

                <button class="btn btn-success" onclick="submitAddBot()" style="width: 100%;">✅ Add Bot</button>
            </div>
        </div>

        <!-- Bot Detail View -->
        <div id="botDetailView" style="display: none;">
            <div class="back-btn">
                <button class="btn btn-secondary" onclick="showBotList()">← Back to Bots</button>
            </div>
            <div id="botDetailContent"></div>
        </div>
    </div>

    <script>
        let currentBotId = null;

        // Load bots on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadBots();
        });

        async function loadBots() {
            try {
                const res = await fetch('/api/bots');
                const bots = await res.json();

                const botListEl = document.getElementById('botList');
                
                if (bots.length === 0) {
                    botListEl.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                            <p class="empty-message" style="color: #cccccc; margin-bottom: 20px; transition: color 0.5s ease;">No bots configured yet</p>
                            <button class="btn btn-success" onclick="showAddBotForm()">➕ Add Your First Bot</button>
                        </div>
                    `;
                } else {
                    botListEl.innerHTML = bots.map(bot => `
                        <div class="bot-card" onclick="viewBot('${bot.id}')">
                            <div class="bot-card-header">
                                <div class="bot-icon">
                                    ${bot.bot_icon ? `<img src="${bot.bot_icon}" style="width: 100%; height: 100%; border-radius: 50%;">` : '🤖'}
                                </div>
                                <div class="bot-info">
                                    <h3>${bot.name}</h3>
                                    <span class="bot-type ${bot.bot_type}">${bot.bot_type}</span>
                                </div>
                            </div>
                            <div class="bot-status-text" style="color: #cccccc; font-size: 12px; transition: color 0.5s ease;">
                                <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: ${bot.status === 'running' ? '#28a745' : bot.status === 'starting' ? '#ffc107' : bot.status === 'stopping' ? '#ff4444' : '#666666'}; margin-right: 4px; box-shadow: 0 0 6px ${bot.status === 'running' ? 'rgba(40, 167, 69, 0.5)' : bot.status === 'starting' ? 'rgba(255, 193, 7, 0.5)' : 'transparent'};"></span>
                                ${bot.status || 'stopped'}
                                ${bot.bot_type === 'official' ? ` • Port: ${bot.port}` : ''}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                showMessage('Failed to load bots', 'error');
                console.error(err);
            }
        }

        function formatUptime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) {
                return `${days}d ${hours % 24}h`;
            } else if (hours > 0) {
                return `${hours}h ${minutes % 60}m`;
            } else if (minutes > 0) {
                return `${minutes}m ${seconds % 60}s`;
            } else {
                return `${seconds}s`;
            }
        }

        function showAddBotForm() {
            document.getElementById('botListView').style.display = 'none';
            document.getElementById('addBotForm').style.display = 'block';
            document.getElementById('botDetailView').style.display = 'none';
            
            // Load official bots for connect_to dropdown
            loadOfficialBots();
        }

        function showBotList() {
            document.getElementById('botListView').style.display = 'block';
            document.getElementById('addBotForm').style.display = 'none';
            document.getElementById('botDetailView').style.display = 'none';
            currentBotId = null;
            loadBots();
        }

        async function loadOfficialBots() {
            try {
                const res = await fetch('/api/bots');
                const bots = await res.json();
                const officialBots = bots.filter(b => b.bot_type === 'official');
                
                const select = document.getElementById('connectTo');
                select.innerHTML = '<option value="">Select official bot...</option>' +
                    officialBots.map(bot => `<option value="${bot.id}">${bot.name}</option>`).join('');
            } catch (err) {
                console.error('Failed to load official bots:', err);
            }
        }

        function toggleConnectTo() {
            const botType = document.getElementById('botType').value;
            const connectToGroup = document.getElementById('connectToGroup');
            const applicationIdGroup = document.getElementById('applicationIdGroup');
            const portGroup = document.getElementById('portGroup');
            
            if (botType === 'selfbot') {
                connectToGroup.style.display = 'block';
                document.getElementById('connectTo').required = true;
                applicationIdGroup.style.display = 'none';
                document.getElementById('botApplicationId').required = false;
                portGroup.style.display = 'none';
            } else {
                connectToGroup.style.display = 'none';
                document.getElementById('connectTo').required = false;
                applicationIdGroup.style.display = 'block';
                document.getElementById('botApplicationId').required = true;
                portGroup.style.display = 'block';
            }
        }

        async function submitAddBot() {
            const token = document.getElementById('botToken').value;
            const botType = document.getElementById('botType').value;
            const applicationId = botType === 'official' ? document.getElementById('botApplicationId').value : null;
            const port = botType === 'official' ? (parseInt(document.getElementById('botPort').value) || 7777) : 7777;
            const connectTo = botType === 'selfbot' ? document.getElementById('connectTo').value : null;

            if (!token || !botType) {
                showMessage('Token and Bot Type are required', 'error');
                return;
            }

            if (botType === 'official' && !applicationId) {
                showMessage('Application ID is required for official bots', 'error');
                return;
            }

            if (botType === 'selfbot' && !connectTo) {
                showMessage('Selfbot must connect to an official bot', 'error');
                return;
            }

            try {
                const res = await fetch('/api/bots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: null, // Will be set when bot connects
                        token,
                        application_id: applicationId,
                        bot_type: botType,
                        bot_icon: null, // Will be set when bot connects
                        port,
                        connect_to: connectTo
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('Bot added successfully!', 'success');
                    setTimeout(() => {
                        showBotList();
                    }, 1500);
                } else {
                    showMessage(`Failed to add bot: ${data.error}`, 'error');
                }
            } catch (err) {
                showMessage('Failed to add bot', 'error');
                console.error(err);
            }
        }

        async function viewBot(botId) {
            currentBotId = botId;
            
            try {
                const [botRes, serversRes] = await Promise.all([
                    fetch(`/api/bots/${botId}`),
                    fetch(`/api/bots/${botId}/servers`)
                ]);

                const bot = await botRes.json();
                const servers = await serversRes.json();

                document.getElementById('botListView').style.display = 'none';
                document.getElementById('addBotForm').style.display = 'none';
                document.getElementById('botDetailView').style.display = 'block';

                const detailContent = document.getElementById('botDetailContent');
                detailContent.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                        <div class="bot-icon" style="width: 80px; height: 80px; font-size: 40px;">
                            ${bot.bot_icon ? `<img src="${bot.bot_icon}" style="width: 100%; height: 100%; border-radius: 50%;">` : '🤖'}
                        </div>
                        <div style="flex: 1;">
                            <h2>${bot.name}</h2>
                            <span class="bot-type ${bot.bot_type}">${bot.bot_type}</span>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-success" onclick="startBot('${bot.id}')" id="startBtn_${bot.id}" ${bot.status === 'running' || bot.status === 'starting' ? 'disabled' : ''}>▶️ Start</button>
                            <button class="btn btn-danger" onclick="stopBot('${bot.id}')" id="stopBtn_${bot.id}" ${bot.status !== 'running' && bot.status !== 'starting' ? 'disabled' : ''}>⏹️ Stop</button>
                            <button class="btn btn-warning" onclick="restartBot('${bot.id}')" id="restartBtn_${bot.id}" ${bot.status !== 'running' && bot.status !== 'starting' ? 'disabled' : ''}>🔄 Restart</button>
                            <button class="btn btn-danger" onclick="deleteBot('${bot.id}')">🗑️ Delete</button>
                        </div>
                    </div>

                    <div class="bot-info-card" style="background: #0d0d0d; border-radius: 14px; padding: 24px; margin-bottom: 20px; border: 1px solid #333333; transition: background-color 0.5s ease, border-color 0.5s ease;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;">
                            <div>
                                <div class="info-label" style="color: #cccccc; font-size: 12px; margin-bottom: 4px; transition: color 0.5s ease;">Status</div>
                                <div class="info-value" style="font-weight: 600; color: #ffffff; transition: color 0.5s ease;">
                                    <span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: ${bot.status === 'running' ? '#28a745' : bot.status === 'starting' ? '#ffc107' : bot.status === 'stopping' ? '#ff4444' : '#666666'}; margin-right: 8px; box-shadow: 0 0 8px ${bot.status === 'running' ? 'rgba(40, 167, 69, 0.6)' : bot.status === 'starting' ? 'rgba(255, 193, 7, 0.6)' : 'transparent'};"></span>
                                    ${bot.status || 'stopped'}
                                </div>
                            </div>
                            ${bot.process_id ? `
                            <div>
                                <div class="info-label" style="color: #cccccc; font-size: 12px; margin-bottom: 4px; transition: color 0.5s ease;">Process ID</div>
                                <div class="info-value" style="font-weight: 600; color: #ffffff; transition: color 0.5s ease;">${bot.process_id}</div>
                            </div>
                            ` : ''}
                            ${bot.uptime_ms && bot.uptime_ms > 0 ? `
                            <div>
                                <div class="info-label" style="color: #cccccc; font-size: 12px; margin-bottom: 4px; transition: color 0.5s ease;">Uptime</div>
                                <div class="info-value" style="font-weight: 600; color: #ffffff; transition: color 0.5s ease;">${formatUptime(bot.uptime_ms)}</div>
                            </div>
                            ` : ''}
                            ${bot.bot_type === 'official' ? `
                            <div>
                                <div class="info-label" style="color: #cccccc; font-size: 12px; margin-bottom: 4px; transition: color 0.5s ease;">Port</div>
                                <div class="info-value" style="font-weight: 600; color: #ffffff; transition: color 0.5s ease;">${bot.port}</div>
                            </div>
                            ${bot.application_id ? `
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <div class="info-label" style="color: #cccccc; font-size: 12px; transition: color 0.5s ease;">Invite Bot</div>
                                <button class="btn btn-primary" onclick="window.open('https://discord.com/api/oauth2/authorize?client_id=${bot.application_id}&permissions=8&scope=bot', '_blank')" style="font-size: 13px; padding: 8px 16px;">
                                    🔗 Invite Bot
                                </button>
                            </div>
                            ` : ''}
                            ` : ''}
                            ${bot.connect_to && bot.connected_bot_name ? `
                            <div>
                                <div class="info-label" style="color: #cccccc; font-size: 12px; margin-bottom: 4px; transition: color 0.5s ease;">Connected To</div>
                                <div class="info-value" style="font-weight: 600; color: #ffffff; transition: color 0.5s ease;">${bot.connected_bot_name}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <h3 style="margin-bottom: 20px;">Servers (${servers.length})</h3>
                    <div class="server-list">
                        ${servers.length === 0 ? '<p class="empty-message" style="grid-column: 1/-1; text-align: center; color: #cccccc; padding: 40px; transition: color 0.5s ease;">No servers yet. Bot will sync servers automatically when running.</p>' :
                        servers.map(server => `
                            <div class="server-card">
                                ${server.server_icon ? `<img src="${server.server_icon}" class="server-icon">` : '<div class="server-icon" style="background: #dc3545;"></div>'}
                                <h4 style="color: #ffffff; transition: color 0.5s ease;">${server.name}</h4>
                                <div class="server-info" style="font-size: 12px; color: #cccccc; margin-top: 12px; transition: color 0.5s ease;">
                                    <div style="margin-bottom: 6px;">👥 ${server.total_members} members</div>
                                    <div style="margin-bottom: 6px;">📊 Level ${server.boost_level}</div>
                                    <div style="margin-bottom: 6px;">🚀 ${server.total_boosters} boosters</div>
                                    <div>📝 ${server.total_channels} channels</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (err) {
                showMessage('Failed to load bot details', 'error');
                console.error(err);
            }
        }

        async function startBot(botId) {
            const startBtn = document.getElementById(`startBtn_${botId}`);
            const stopBtn = document.getElementById(`stopBtn_${botId}`);
            const restartBtn = document.getElementById(`restartBtn_${botId}`);
            
            // Disable start button, enable stop/restart
            if (startBtn) startBtn.disabled = true;
            if (stopBtn) stopBtn.disabled = false;
            if (restartBtn) restartBtn.disabled = false;
            
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bot_id: botId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Bot started successfully!', 'success');
                } else {
                    showMessage(`Failed to start: ${data.error}`, 'error');
                    // Re-enable start button on error
                    if (startBtn) startBtn.disabled = false;
                    if (stopBtn) stopBtn.disabled = true;
                    if (restartBtn) restartBtn.disabled = true;
                }
            } catch (err) {
                showMessage('Failed to start bot', 'error');
                console.error(err);
                // Re-enable start button on error
                if (startBtn) startBtn.disabled = false;
                if (stopBtn) stopBtn.disabled = true;
                if (restartBtn) restartBtn.disabled = true;
            }
        }

        async function stopBot(botId) {
            const startBtn = document.getElementById(`startBtn_${botId}`);
            const stopBtn = document.getElementById(`stopBtn_${botId}`);
            const restartBtn = document.getElementById(`restartBtn_${botId}`);
            
            // Disable stop/restart buttons, enable start
            if (startBtn) startBtn.disabled = false;
            if (stopBtn) stopBtn.disabled = true;
            if (restartBtn) restartBtn.disabled = true;
            
            try {
                const res = await fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bot_id: botId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Bot stopped successfully!', 'success');
                } else {
                    showMessage(`Failed to stop: ${data.error}`, 'error');
                    // Re-enable stop/restart on error
                    if (stopBtn) stopBtn.disabled = false;
                    if (restartBtn) restartBtn.disabled = false;
                    if (startBtn) startBtn.disabled = true;
                }
            } catch (err) {
                showMessage('Failed to stop bot', 'error');
                console.error(err);
                // Re-enable stop/restart on error
                if (stopBtn) stopBtn.disabled = false;
                if (restartBtn) restartBtn.disabled = false;
                if (startBtn) startBtn.disabled = true;
            }
        }

        async function restartBot(botId) {
            const startBtn = document.getElementById(`startBtn_${botId}`);
            const stopBtn = document.getElementById(`stopBtn_${botId}`);
            const restartBtn = document.getElementById(`restartBtn_${botId}`);
            
            // Disable all buttons during restart
            if (startBtn) startBtn.disabled = true;
            if (stopBtn) stopBtn.disabled = true;
            if (restartBtn) restartBtn.disabled = true;
            
            try {
                const res = await fetch('/api/restart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bot_id: botId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Bot restarting...', 'success');
                    // After restart, stop/restart should be enabled
                    setTimeout(() => {
                        if (stopBtn) stopBtn.disabled = false;
                        if (restartBtn) restartBtn.disabled = false;
                    }, 3000);
                } else {
                    showMessage(`Failed to restart: ${data.error}`, 'error');
                    // Re-enable buttons on error
                    if (startBtn) startBtn.disabled = false;
                    if (stopBtn) stopBtn.disabled = true;
                    if (restartBtn) restartBtn.disabled = true;
                }
            } catch (err) {
                showMessage('Failed to restart bot', 'error');
                console.error(err);
                // Re-enable buttons on error
                if (startBtn) startBtn.disabled = false;
                if (stopBtn) stopBtn.disabled = true;
                if (restartBtn) restartBtn.disabled = true;
            }
        }

        // Auto-refresh bot list and detail view every 5 seconds to show updated status/uptime
        setInterval(() => {
            if (currentBotId) {
                // Refresh bot detail view
                viewBot(currentBotId).catch(() => {});
            } else {
                // Refresh bot list
                loadBots().catch(() => {});
            }
        }, 5000);

        async function deleteBot(botId) {
            if (!confirm('Are you sure you want to delete this bot? This will also delete all associated servers, channels, and roles.')) {
                return;
            }

            try {
                const res = await fetch(`/api/bots/${botId}`, {
                    method: 'DELETE'
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('Bot deleted successfully', 'success');
                    setTimeout(() => {
                        showBotList();
                    }, 1500);
                } else {
                    showMessage(`Failed to delete bot: ${data.error}`, 'error');
                }
            } catch (err) {
                showMessage('Failed to delete bot', 'error');
                console.error(err);
            }
        }

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 5000);
        }

        // Theme Toggle Functionality
        $(document).ready(function() {
            // Check for saved theme preference or default to dark
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                $('body').addClass('light');
                $('html').removeClass('dark');
                $('#themeToggle').text('☀️');
            } else {
                $('body').removeClass('light');
                $('html').addClass('dark');
                $('#themeToggle').text('🌙');
            }

            // Theme toggle button click handler
            $('#themeToggle').on('click', function() {
                $('body').toggleClass('light');
                
                if ($('body').hasClass('light')) {
                    $('html').removeClass('dark');
                    $(this).html('☀️').fadeIn(200);
                    localStorage.setItem('theme', 'light');
                    
                    // Animate all cards smoothly
                    $('.bot-card, .server-card, .form-section').each(function(index) {
                        $(this).css('opacity', 0);
                        setTimeout(() => {
                            $(this).css('transition', 'opacity 0.3s ease');
                            $(this).css('opacity', 1);
                        }, index * 20);
                    });
                } else {
                    $('html').addClass('dark');
                    $(this).html('🌙').fadeIn(200);
                    localStorage.setItem('theme', 'dark');
                    
                    // Animate all cards smoothly
                    $('.bot-card, .server-card, .form-section').each(function(index) {
                        $(this).css('opacity', 0);
                        setTimeout(() => {
                            $(this).css('transition', 'opacity 0.3s ease');
                            $(this).css('opacity', 1);
                        }, index * 20);
                    });
                }

                // Add rotation animation
                $(this).css('transform', 'rotate(360deg)');
                setTimeout(() => {
                    $(this).css('transform', 'rotate(0deg)');
                }, 300);
            });

            // Smooth fade-in on page load
            $('.container').css('opacity', 0);
            setTimeout(() => {
                $('.container').animate({ opacity: 1 }, 500);
            }, 100);
        });
    </script>
</body>
</html>
